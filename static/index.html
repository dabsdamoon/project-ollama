<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ollama Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e; color: #e0e0e0; height: 100vh;
    display: flex; flex-direction: column;
  }
  header {
    padding: 12px 20px; background: #16213e; border-bottom: 1px solid #0f3460;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  #model-select {
    margin-left: auto; padding: 6px 10px; border-radius: 6px;
    background: #0f3460; color: #e0e0e0; border: 1px solid #533483;
    font-size: 14px;
  }
  #new-chat-btn {
    padding: 6px 14px; border-radius: 6px; background: #533483;
    color: #fff; border: none; cursor: pointer; font-size: 14px;
  }
  #new-chat-btn:hover { background: #6a42a0; }
  #chat-container {
    flex: 1; overflow-y: auto; padding: 20px; display: flex;
    flex-direction: column; gap: 16px;
  }
  .message {
    max-width: 80%; padding: 12px 16px; border-radius: 12px;
    line-height: 1.5; white-space: pre-wrap; word-wrap: break-word;
    font-size: 15px;
  }
  .message.user {
    align-self: flex-end; background: #533483; color: #fff;
  }
  .message.assistant {
    align-self: flex-start; background: #16213e; border: 1px solid #0f3460;
  }
  .message.assistant .thinking {
    color: #888; font-style: italic; border-left: 2px solid #555;
    padding-left: 10px; margin-bottom: 8px;
  }
  #input-area {
    padding: 16px 20px; background: #16213e; border-top: 1px solid #0f3460;
    display: flex; gap: 10px;
  }
  #msg-input {
    flex: 1; padding: 12px 16px; border-radius: 10px;
    background: #0f3460; color: #e0e0e0; border: 1px solid #533483;
    font-size: 15px; resize: none; font-family: inherit;
    min-height: 48px; max-height: 200px;
  }
  #msg-input:focus { outline: none; border-color: #6a42a0; }
  #send-btn {
    padding: 12px 24px; border-radius: 10px; background: #533483;
    color: #fff; border: none; cursor: pointer; font-size: 15px;
    font-weight: 600; align-self: flex-end;
  }
  #send-btn:hover { background: #6a42a0; }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h1>Ollama Chat</h1>
  <select id="model-select"></select>
  <button id="new-chat-btn">New Chat</button>
</header>
<div id="chat-container"></div>
<div id="input-area">
  <textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea>
  <button id="send-btn">Send</button>
</div>

<script>
const chatContainer = document.getElementById("chat-container");
const msgInput = document.getElementById("msg-input");
const sendBtn = document.getElementById("send-btn");
const modelSelect = document.getElementById("model-select");
const newChatBtn = document.getElementById("new-chat-btn");

let messages = [];
let streaming = false;

async function loadModels() {
  try {
    const resp = await fetch("/api/models");
    const models = await resp.json();
    modelSelect.innerHTML = models
      .map(m => `<option value="${m}">${m}</option>`)
      .join("");
  } catch {
    modelSelect.innerHTML = '<option>gemma4:27b</option>';
  }
}

function addMessageBubble(role, content) {
  const div = document.createElement("div");
  div.className = `message ${role}`;
  div.textContent = content;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  return div;
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || streaming) return;

  messages.push({ role: "user", content: text });
  addMessageBubble("user", text);
  msgInput.value = "";
  msgInput.style.height = "auto";

  streaming = true;
  sendBtn.disabled = true;

  const bubble = addMessageBubble("assistant", "");
  let fullContent = "";
  let thinkContent = "";
  let inThinking = false;

  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: modelSelect.value,
        messages: messages,
      }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.trim()) continue;
        try {
          const data = JSON.parse(line);
          const token = data.message?.content ?? "";

          if (token === "<think>") {
            inThinking = true;
            continue;
          }
          if (token === "</think>") {
            inThinking = false;
            continue;
          }
          // Handle tokens that contain think tags mixed with content
          if (token.includes("<think>") || token.includes("</think>")) {
            const parts = token.split(/(<\/?think>)/);
            for (const part of parts) {
              if (part === "<think>") { inThinking = true; continue; }
              if (part === "</think>") { inThinking = false; continue; }
              if (inThinking) thinkContent += part;
              else fullContent += part;
            }
          } else if (inThinking) {
            thinkContent += token;
          } else {
            fullContent += token;
          }

          renderBubble(bubble, thinkContent, fullContent);
        } catch {}
      }
    }
  } catch (err) {
    fullContent = `Error: ${err.message}`;
    bubble.textContent = fullContent;
  }

  messages.push({ role: "assistant", content: fullContent });
  streaming = false;
  sendBtn.disabled = false;
  msgInput.focus();
}

function renderBubble(bubble, thinking, content) {
  bubble.innerHTML = "";
  if (thinking) {
    const thinkDiv = document.createElement("div");
    thinkDiv.className = "thinking";
    thinkDiv.textContent = thinking;
    bubble.appendChild(thinkDiv);
  }
  if (content) {
    const textNode = document.createTextNode(content);
    bubble.appendChild(textNode);
  }
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

newChatBtn.addEventListener("click", () => {
  messages = [];
  chatContainer.innerHTML = "";
  msgInput.focus();
});

sendBtn.addEventListener("click", sendMessage);

msgInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

msgInput.addEventListener("input", () => {
  msgInput.style.height = "auto";
  msgInput.style.height = Math.min(msgInput.scrollHeight, 200) + "px";
});

loadModels();
msgInput.focus();
</script>
</body>
</html>
